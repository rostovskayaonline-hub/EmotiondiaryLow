<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Дневник эмоций</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #131320);
    color: var(--tg-theme-text-color, #e0e0e8);
    overflow-x: hidden;
  }
  #root { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }
  input[type="range"] { width: 100%; }
  textarea:focus, select:focus { outline: none; border-color: #77C9D4 !important; }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area, Cell, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis } = Recharts;

/* ── Telegram Web App ── */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
}

/* ── Constants ── */
const EMOTIONS = [
  { id: "joy", label: "Радость", emoji: "😊", color: "#FFB347", cl: "rgba(255,179,71,0.15)" },
  { id: "calm", label: "Спокойствие", emoji: "😌", color: "#77C9D4", cl: "rgba(119,201,212,0.15)" },
  { id: "sadness", label: "Грусть", emoji: "😢", color: "#7B9ACC", cl: "rgba(123,154,204,0.15)" },
  { id: "anxiety", label: "Тревога", emoji: "😰", color: "#C491C5", cl: "rgba(196,145,197,0.15)" },
  { id: "anger", label: "Злость", emoji: "😤", color: "#E8726E", cl: "rgba(232,114,110,0.15)" },
  { id: "love", label: "Любовь", emoji: "🥰", color: "#F4A0B5", cl: "rgba(244,160,181,0.15)" },
  { id: "fear", label: "Страх", emoji: "😨", color: "#A39BC9", cl: "rgba(163,155,201,0.15)" },
  { id: "surprise", label: "Удивление", emoji: "😲", color: "#F9D56E", cl: "rgba(249,213,110,0.15)" },
  { id: "boredom", label: "Скука", emoji: "😑", color: "#B0B8BF", cl: "rgba(176,184,191,0.15)" },
  { id: "gratitude", label: "Благодарность", emoji: "🙏", color: "#8FBF9F", cl: "rgba(143,191,159,0.15)" },
  { id: "guilt", label: "Вина", emoji: "😔", color: "#C4A882", cl: "rgba(196,168,130,0.15)" },
  { id: "inspiration", label: "Вдохновение", emoji: "✨", color: "#E8B84B", cl: "rgba(232,184,75,0.15)" },
];

const INT_LABELS = ["","Едва","Слабо","Умеренно","Заметно","Сильно","Очень сильно","Пик"];
const WD = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const MO = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

const dk = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const hs = d => `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;

/* ── Storage ── */
const load = (k,def) => { try { const r=localStorage.getItem(k); return r?JSON.parse(r):def; } catch{return def;} };
const save = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };

/* ── Demo data ── */
function genDemo() {
  const data = {};
  const now = new Date();
  for (let off = 30; off >= 0; off--) {
    const d = new Date(now); d.setDate(d.getDate() - off);
    const key = dk(d);
    const entries = [];
    const n = off === 0 ? 3 : Math.floor(Math.random()*5)+2;
    for (let e=0;e<n;e++) {
      const h=8+Math.floor(Math.random()*14), m=Math.floor(Math.random()*60);
      const emo=EMOTIONS[Math.floor(Math.random()*EMOTIONS.length)];
      entries.push({
        id:`${key}-${e}`, emotionId:emo.id, intensity:Math.floor(Math.random()*6)+2,
        note:["Просто так","После встречи","На прогулке","За работой","Дома вечером",""][Math.floor(Math.random()*6)],
        time:`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`,
        timestamp: new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m).getTime()
      });
    }
    entries.sort((a,b)=>a.timestamp-b.timestamp);
    data[key] = { entries, summary: off>0?["Хороший день","Немного устала","Эмоциональные качели","Спокойный день",""][Math.floor(Math.random()*5)]:"" };
  }
  return data;
}

/* ── Haptic ── */
const haptic = (type="impact") => { try{tg?.HapticFeedback?.[type==="impact"?"impactOccurred":"notificationOccurred"](type==="impact"?"light":"success");}catch{} };

/* ────────── APP ────────── */
function App() {
  const [allData,setAllData] = useState(()=>{ const d=load("emo-data",null); return d&&Object.keys(d).length>0?d:genDemo(); });
  const [settings,setSettings] = useState(()=>load("emo-settings",{startHour:8,endHour:22,reminderOn:true}));
  const [screen,setScreen] = useState("today");
  const [selDate,setSelDate] = useState(new Date());
  const [chartPer,setChartPer] = useState("day");
  const [sumPer,setSumPer] = useState("day");
  const [editSum,setEditSum] = useState("");
  const [selEmo,setSelEmo] = useState(null);
  const [selInt,setSelInt] = useState(4);
  const [selNote,setSelNote] = useState("");
  const [lastRem,setLastRem] = useState(0);
  const [toast,setToast] = useState("");

  useEffect(()=>{save("emo-data",allData);},[allData]);
  useEffect(()=>{save("emo-settings",settings);},[settings]);

  // Reminder
  useEffect(()=>{
    if(!settings.reminderOn)return;
    const iv=setInterval(()=>{
      const now=new Date(),h=now.getHours(),ms=now.getTime();
      if(h>=settings.startHour&&h<settings.endHour&&ms-lastRem>3500000){
        const td=allData[dk(now)],last=td?.entries?.[td.entries.length-1];
        if(!last||ms-last.timestamp>3500000){
          if(Notification.permission==="granted") new Notification("🌿 Дневник эмоций",{body:"Как ты сейчас себя чувствуешь?"});
          setLastRem(ms);
        }
      }
    },60000);
    return()=>clearInterval(iv);
  },[settings,allData,lastRem]);

  const todayKey=dk(selDate);
  const todayData=allData[todayKey]||{entries:[],summary:""};
  const isToday=dk(selDate)===dk(new Date());

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2000);};

  const addEntry=useCallback(()=>{
    if(!selEmo)return;
    const now=new Date(),key=dk(now);
    const entry={id:`${key}-${Date.now()}`,emotionId:selEmo,intensity:selInt,note:selNote,time:hs(now),timestamp:now.getTime()};
    setAllData(prev=>{
      const dd=prev[key]||{entries:[],summary:""};
      return{...prev,[key]:{...dd,entries:[...dd.entries,entry].sort((a,b)=>a.timestamp-b.timestamp)}};
    });
    haptic();
    showToast("✓ Запись сохранена");
    setSelEmo(null);setSelInt(4);setSelNote("");setScreen("today");
  },[selEmo,selInt,selNote]);

  const deleteEntry=useCallback((id)=>{
    setAllData(prev=>{
      const u={...prev};
      for(const k of Object.keys(u)){
        if(u[k].entries?.some(e=>e.id===id)){
          u[k]={...u[k],entries:u[k].entries.filter(e=>e.id!==id)};break;
        }
      }
      return u;
    });
    haptic();
  },[]);

  const saveSummary=useCallback((per)=>{
    if(per==="day"){
      const key=dk(selDate);
      setAllData(prev=>({...prev,[key]:{...(prev[key]||{entries:[]}),summary:editSum}}));
    } else {
      const mk=per==="week"?`week-${gwk(selDate)}`:`month-${selDate.getFullYear()}-${selDate.getMonth()}`;
      setAllData(prev=>({...prev,[`_s_${mk}`]:{text:editSum}}));
    }
    haptic();showToast("✓ Итоги сохранены");
  },[editSum,selDate]);

  function gwk(d){const j=new Date(d.getFullYear(),0,1);return`${d.getFullYear()}-W${Math.ceil(((d-j)/864e5+j.getDay()+1)/7)}`;}

  const goDay=(off)=>{const d=new Date(selDate);d.setDate(d.getDate()+off);setSelDate(d);haptic();};
  const fmtDate=(d)=>`${d.getDate()} ${MO[d.getMonth()].slice(0,3).toLowerCase()} ${d.getFullYear()}`;

  /* Chart data */
  const chartData=useMemo(()=>{
    if(chartPer==="day"){
      return todayData.entries.map(e=>{const em=EMOTIONS.find(x=>x.id===e.emotionId);return{time:e.time,intensity:e.intensity,emotion:em?.label||"",color:em?.color||"#999",emoji:em?.emoji||""};});
    }
    if(chartPer==="week"){
      const days=[];const st=new Date(selDate);st.setDate(st.getDate()-((st.getDay()+6)%7));
      for(let i=0;i<7;i++){const d=new Date(st);d.setDate(st.getDate()+i);const k=dk(d),de=allData[k]?.entries||[];
        if(!de.length){days.push({day:WD[i],avg:0,dom:"—",color:"#444",emoji:"",date:dk(d)});}
        else{const ec={};let t=0;de.forEach(e=>{ec[e.emotionId]=(ec[e.emotionId]||0)+e.intensity;t+=e.intensity;});
          const dm=Object.entries(ec).sort((a,b)=>b[1]-a[1])[0][0],em=EMOTIONS.find(x=>x.id===dm);
          days.push({day:WD[i],avg:Math.round(t/de.length*10)/10,dom:em?.label||"",color:em?.color||"#999",emoji:em?.emoji||"",date:dk(d)});
        }
      }return days;
    }
    const y=selDate.getFullYear(),m=selDate.getMonth(),dim=new Date(y,m+1,0).getDate(),r=[];
    for(let day=1;day<=dim;day++){const d=new Date(y,m,day),k=dk(d),de=allData[k]?.entries||[];
      if(!de.length){r.push({day,avg:0,color:"#444"});}
      else{const ec={};let t=0;de.forEach(e=>{ec[e.emotionId]=(ec[e.emotionId]||0)+e.intensity;t+=e.intensity;});
        const dm=Object.entries(ec).sort((a,b)=>b[1]-a[1])[0][0],em=EMOTIONS.find(x=>x.id===dm);
        r.push({day,avg:Math.round(t/de.length*10)/10,color:em?.color||"#999",emoji:em?.emoji});
      }
    }return r;
  },[chartPer,selDate,allData,todayData]);

  const radarData=useMemo(()=>{
    let ent=[];
    if(sumPer==="day"){ent=todayData.entries;}
    else if(sumPer==="week"){const st=new Date(selDate);st.setDate(st.getDate()-((st.getDay()+6)%7));for(let i=0;i<7;i++){const d=new Date(st);d.setDate(st.getDate()+i);ent.push(...(allData[dk(d)]?.entries||[]));}}
    else{const y=selDate.getFullYear(),m=selDate.getMonth(),dim=new Date(y,m+1,0).getDate();for(let day=1;day<=dim;day++)ent.push(...(allData[dk(new Date(y,m,day))]?.entries||[]));}
    const c={};ent.forEach(e=>{c[e.emotionId]=(c[e.emotionId]||0)+e.intensity;});
    return EMOTIONS.filter(em=>c[em.id]).map(em=>({emotion:em.emoji+" "+em.label,value:c[em.id]||0,color:em.color}));
  },[sumPer,selDate,allData,todayData]);

  const totalEntries=useMemo(()=>{
    let ent=[];
    if(sumPer==="day") ent=todayData.entries;
    else if(sumPer==="week"){const st=new Date(selDate);st.setDate(st.getDate()-((st.getDay()+6)%7));for(let i=0;i<7;i++){const d=new Date(st);d.setDate(st.getDate()+i);ent.push(...(allData[dk(d)]?.entries||[]));}}
    else{const y=selDate.getFullYear(),m=selDate.getMonth(),dim=new Date(y,m+1,0).getDate();for(let day=1;day<=dim;day++)ent.push(...(allData[dk(new Date(y,m,day))]?.entries||[]));}
    return ent.length;
  },[sumPer,selDate,allData,todayData]);

  const reqNotif=()=>{if("Notification" in window)Notification.requestPermission();};

  const bg = tg?.themeParams?.bg_color || "#131320";
  const isDark = !bg || parseInt(bg.replace("#","").slice(0,2),16) < 128;
  const S = makeStyles(isDark);

  return (
    <div style={S.app}>
      {/* Toast */}
      {toast && <div style={S.toast}>{toast}</div>}

      {/* Header */}
      <div style={S.header}>
        <div style={S.hLeft}><span style={{fontSize:24}}>🌿</span><span style={S.hTitle}>Дневник эмоций</span></div>
        <button style={S.setBtn} onClick={()=>setScreen(screen==="settings"?"today":"settings")}>⚙️</button>
      </div>

      {/* Date nav */}
      {screen!=="settings"&&screen!=="add"&&(
        <div style={S.dateNav}>
          <button style={S.dBtn} onClick={()=>goDay(-1)}>‹</button>
          <button style={S.dCur} onClick={()=>setSelDate(new Date())}>{isToday?"Сегодня":fmtDate(selDate)}</button>
          <button style={S.dBtn} onClick={()=>goDay(1)}>›</button>
        </div>
      )}

      {/* Tabs */}
      {screen!=="add"&&screen!=="settings"&&(
        <div style={S.tabs}>
          {[{id:"today",l:"Записи",i:"📝"},{id:"charts",l:"Графики",i:"📊"},{id:"summary",l:"Итоги",i:"🔍"}].map(t=>(
            <button key={t.id} style={{...S.tab,...(screen===t.id?S.tabA:{})}} onClick={()=>{setScreen(t.id);haptic();}}>
              <span style={{fontSize:18}}>{t.i}</span><span style={{fontSize:11,fontWeight:500}}>{t.l}</span>
            </button>
          ))}
        </div>
      )}

      <div style={S.content}>

        {/* ── SETTINGS ── */}
        {screen==="settings"&&(
          <div>
            <h2 style={S.secTitle}>Настройки напоминаний</h2>
            <div style={S.sRow}>
              <span style={S.sLabel}>Напоминания</span>
              <button style={{...S.toggle,...(settings.reminderOn?S.toggleOn:{})}} onClick={()=>{setSettings(s=>({...s,reminderOn:!s.reminderOn}));reqNotif();}}>
                <div style={{...S.tKnob,...(settings.reminderOn?S.tKnobOn:{})}}/>
              </button>
            </div>
            <div style={S.sRow}>
              <span style={S.sLabel}>Начало дня</span>
              <select style={S.sel} value={settings.startHour} onChange={e=>setSettings(s=>({...s,startHour:+e.target.value}))}>
                {Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}
              </select>
            </div>
            <div style={S.sRow}>
              <span style={S.sLabel}>Конец дня</span>
              <select style={S.sel} value={settings.endHour} onChange={e=>setSettings(s=>({...s,endHour:+e.target.value}))}>
                {Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}
              </select>
            </div>
            <p style={S.hint}>Напоминание раз в час, если последняя запись была более часа назад</p>
            <button style={S.primBtn} onClick={()=>{reqNotif();showToast("✓ Уведомления включены");setScreen("today");}}>Включить уведомления</button>
            <button style={{...S.primBtn,background:"transparent",border:"1px solid #333",color:"#888",marginTop:10}} onClick={()=>{
              if(confirm("Удалить все данные?")){save("emo-data","");setAllData({});showToast("Данные удалены");}
            }}>Очистить все данные</button>
          </div>
        )}

        {/* ── ADD ── */}
        {screen==="add"&&(
          <div style={{paddingBottom:30}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <button style={S.backBtn} onClick={()=>setScreen("today")}>← Назад</button>
              <h2 style={{...S.secTitle,margin:0}}>Новая запись</h2>
            </div>
            <p style={S.prompt}>Что ты сейчас чувствуешь?</p>
            <div style={S.emoGrid}>
              {EMOTIONS.map(em=>(
                <button key={em.id} style={{
                  ...S.emoChip,
                  background:selEmo===em.id?em.color:em.cl,
                  color:selEmo===em.id?"#fff":em.color,
                  border:`2px solid ${selEmo===em.id?em.color:"transparent"}`,
                  transform:selEmo===em.id?"scale(1.06)":"scale(1)",
                  boxShadow:selEmo===em.id?`0 4px 20px ${em.color}55`:"none",
                }} onClick={()=>{setSelEmo(em.id);haptic();}}>
                  <span style={{fontSize:20}}>{em.emoji}</span>
                  <span style={{fontSize:11,fontWeight:500}}>{em.label}</span>
                </button>
              ))}
            </div>
            {selEmo&&(<>
              <p style={S.prompt}>Насколько интенсивно? — <strong style={{color:EMOTIONS.find(e=>e.id===selEmo)?.color}}>{INT_LABELS[selInt]}</strong></p>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:13,color:"#666",width:20,textAlign:"center"}}>1</span>
                <input type="range" min={1} max={7} value={selInt} onChange={e=>setSelInt(+e.target.value)} style={{flex:1,accentColor:EMOTIONS.find(e=>e.id===selEmo)?.color}}/>
                <span style={{fontSize:13,color:"#666",width:20,textAlign:"center"}}>7</span>
              </div>
              <p style={S.prompt}>Почему? Что происходит?</p>
              <textarea style={S.ta} value={selNote} onChange={e=>setSelNote(e.target.value)} placeholder="Опиши свои мысли и обстоятельства..." rows={3}/>
              <button style={{...S.primBtn,background:EMOTIONS.find(e=>e.id===selEmo)?.color}} onClick={addEntry}>Сохранить запись</button>
            </>)}
          </div>
        )}

        {/* ── TODAY ── */}
        {screen==="today"&&(
          <div>
            {todayData.entries.length===0?(
              <div style={S.empty}>
                <span style={{fontSize:48}}>🌱</span>
                <p style={{fontSize:16,color:"#666",fontWeight:500}}>Пока нет записей за этот день</p>
                {isToday&&<p style={{fontSize:13,color:"#444"}}>Нажми + чтобы добавить первую</p>}
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column"}}>
                {todayData.entries.map((entry,idx)=>{
                  const em=EMOTIONS.find(e=>e.id===entry.emotionId);
                  return(
                    <div key={entry.id} style={{display:"flex",gap:12,minHeight:60}}>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:20,paddingTop:6}}>
                        <div style={{width:12,height:12,borderRadius:"50%",background:em?.color,flexShrink:0}}/>
                        {idx<todayData.entries.length-1&&<div style={{width:2,flex:1,marginTop:4,borderRadius:1,minHeight:20,background:(em?.color||"#333")+"33"}}/>}
                      </div>
                      <div style={{flex:1,background:"rgba(255,255,255,0.03)",borderRadius:"0 12px 12px 0",padding:"10px 14px",marginBottom:8,borderLeft:`3px solid ${em?.color}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,color:"#6a6a7a",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{entry.time}</span>
                          <span style={{fontSize:13,fontWeight:500}}>{em?.emoji} {em?.label}</span>
                          <div style={{display:"flex",gap:2,marginLeft:"auto"}}>
                            {Array.from({length:entry.intensity}).map((_,i)=><div key={i} style={{width:6,height:6,borderRadius:3,background:em?.color,opacity:0.4+i*0.1}}/>)}
                          </div>
                          <button style={{background:"none",border:"none",color:"#444",fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}} onClick={()=>deleteEntry(entry.id)}>×</button>
                        </div>
                        {entry.note&&<p style={{fontSize:13,color:"#8a8a9a",marginTop:6,lineHeight:1.5}}>{entry.note}</p>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── CHARTS ── */}
        {screen==="charts"&&(
          <div>
            <div style={S.perTabs}>
              {[{id:"day",l:"День"},{id:"week",l:"Неделя"},{id:"month",l:"Месяц"}].map(p=>(
                <button key={p.id} style={{...S.perTab,...(chartPer===p.id?S.perTabA:{})}} onClick={()=>{setChartPer(p.id);haptic();}}>{p.l}</button>
              ))}
            </div>

            {chartPer==="day"&&(
              <div style={S.chartBox}>
                <h3 style={S.chTitle}>Эмоции за день</h3>
                {chartData.length===0?<p style={{fontSize:13,color:"#444",textAlign:"center",padding:30}}>Нет данных</p>:(
                  <>
                  <ResponsiveContainer width="100%" height={220}>
                    <BarChart data={chartData} margin={{top:10,right:10,left:-20,bottom:0}}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#2a2a35"/>
                      <XAxis dataKey="time" tick={{fill:"#8a8a9a",fontSize:11}}/>
                      <YAxis domain={[0,7]} tick={{fill:"#8a8a9a",fontSize:11}}/>
                      <Tooltip contentStyle={{background:"#1e1e2a",border:"1px solid #333",borderRadius:12,fontSize:13}} formatter={(v,n,p)=>[`${p.payload.emoji} ${p.payload.emotion}: ${v}/7`,""]}/>
                      <Bar dataKey="intensity" radius={[6,6,0,0]}>{chartData.map((d,i)=><Cell key={i} fill={d.color}/>)}</Bar>
                    </BarChart>
                  </ResponsiveContainer>
                  <div style={{display:"flex",flexWrap:"wrap",gap:10,padding:"10px 6px 0"}}>
                    {[...new Set(chartData.map(d=>d.emotion))].map(name=>{const e=chartData.find(d=>d.emotion===name);return(
                      <span key={name} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#8a8a9a"}}>
                        <span style={{width:8,height:8,borderRadius:4,background:e?.color}}/>{e?.emoji} {name}
                      </span>
                    );})}
                  </div>
                  </>
                )}
              </div>
            )}

            {chartPer==="week"&&(
              <div style={S.chartBox}>
                <h3 style={S.chTitle}>Средняя интенсивность за неделю</h3>
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={chartData} margin={{top:10,right:10,left:-20,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#2a2a35"/>
                    <XAxis dataKey="day" tick={{fill:"#8a8a9a",fontSize:12}}/>
                    <YAxis domain={[0,7]} tick={{fill:"#8a8a9a",fontSize:11}}/>
                    <Tooltip contentStyle={{background:"#1e1e2a",border:"1px solid #333",borderRadius:12,fontSize:13}} formatter={(v,n,p)=>[`${p.payload.emoji||""} ${p.payload.dom}: ${v}/7`,"Ср. интенсивность"]}/>
                    <Bar dataKey="avg" radius={[6,6,0,0]}>{chartData.map((d,i)=><Cell key={i} fill={d.color}/>)}</Bar>
                  </BarChart>
                </ResponsiveContainer>
                <div style={{display:"flex",gap:6,padding:"12px 4px 0",flexWrap:"wrap",justifyContent:"center"}}>
                  {chartData.filter(d=>d.avg>0).map(d=>(
                    <div key={d.day} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 10px",background:"rgba(255,255,255,0.03)",borderRadius:10,minWidth:52}}>
                      <span style={{fontSize:11,color:"#6a6a7a",fontWeight:600}}>{d.day}</span>
                      <span style={{fontSize:20}}>{d.emoji}</span>
                      <span style={{fontSize:11,color:"#8a8a9a"}}>{d.dom}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {chartPer==="month"&&(
              <div style={S.chartBox}>
                <h3 style={S.chTitle}>{MO[selDate.getMonth()]} {selDate.getFullYear()}</h3>
                <ResponsiveContainer width="100%" height={220}>
                  <AreaChart data={chartData} margin={{top:10,right:10,left:-20,bottom:0}}>
                    <defs><linearGradient id="mg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#77C9D4" stopOpacity={0.3}/><stop offset="95%" stopColor="#77C9D4" stopOpacity={0}/></linearGradient></defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#2a2a35"/>
                    <XAxis dataKey="day" tick={{fill:"#8a8a9a",fontSize:10}} interval={2}/>
                    <YAxis domain={[0,7]} tick={{fill:"#8a8a9a",fontSize:11}}/>
                    <Tooltip contentStyle={{background:"#1e1e2a",border:"1px solid #333",borderRadius:12,fontSize:13}} formatter={(v)=>[`${v}/7`,"Ср. интенсивность"]}/>
                    <Area type="monotone" dataKey="avg" stroke="#77C9D4" fill="url(#mg)" strokeWidth={2}/>
                  </AreaChart>
                </ResponsiveContainer>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,padding:"12px 4px 0"}}>
                  {chartData.map(d=>(
                    <div key={d.day} style={{aspectRatio:"1",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:d.avg>0?d.color+Math.round(d.avg/7*200+55).toString(16):"#1e1e2a"}}>
                      <span style={{fontSize:9,color:d.avg>3?"#fff":"#666"}}>{d.day}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── SUMMARY ── */}
        {screen==="summary"&&(
          <div>
            <div style={S.perTabs}>
              {[{id:"day",l:"День"},{id:"week",l:"Неделя"},{id:"month",l:"Месяц"}].map(p=>(
                <button key={p.id} style={{...S.perTab,...(sumPer===p.id?S.perTabA:{})}} onClick={()=>{
                  setSumPer(p.id);haptic();
                  if(p.id==="day")setEditSum(allData[dk(selDate)]?.summary||"");
                  else{const mk=p.id==="week"?`week-${gwk(selDate)}`:`month-${selDate.getFullYear()}-${selDate.getMonth()}`;setEditSum(allData[`_s_${mk}`]?.text||"");}
                }}>{p.l}</button>
              ))}
            </div>
            {radarData.length>0&&(
              <div style={S.chartBox}>
                <h3 style={S.chTitle}>Профиль эмоций</h3>
                <ResponsiveContainer width="100%" height={250}>
                  <RadarChart data={radarData} margin={{top:20,right:30,bottom:20,left:30}}>
                    <PolarGrid stroke="#2a2a35"/>
                    <PolarAngleAxis dataKey="emotion" tick={{fill:"#8a8a9a",fontSize:10}}/>
                    <PolarRadiusAxis tick={false} axisLine={false}/>
                    <Radar dataKey="value" stroke="#77C9D4" fill="#77C9D4" fillOpacity={0.2} strokeWidth={2}/>
                  </RadarChart>
                </ResponsiveContainer>
              </div>
            )}
            {radarData.length>0&&(
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <div style={S.statCard}><span style={S.statVal}>{radarData.length}</span><span style={S.statLbl}>эмоций</span></div>
                <div style={S.statCard}><span style={S.statVal}>{radarData.sort((a,b)=>b.value-a.value)[0]?.emotion?.split(" ")[0]}</span><span style={S.statLbl}>доминирует</span></div>
                <div style={S.statCard}><span style={S.statVal}>{totalEntries}</span><span style={S.statLbl}>записей</span></div>
              </div>
            )}
            <div style={{...S.chartBox,padding:16}}>
              <h3 style={S.chTitle}>{sumPer==="day"?"Итоги дня":sumPer==="week"?"Итоги недели":"Итоги месяца"}</h3>
              <textarea style={{...S.ta,minHeight:120}} value={editSum} onChange={e=>setEditSum(e.target.value)} placeholder={`Запиши свои мысли и выводы за ${sumPer==="day"?"день":sumPer==="week"?"неделю":"месяц"}...`} rows={5}/>
              <button style={S.primBtn} onClick={()=>saveSummary(sumPer)}>Сохранить итоги</button>
            </div>
          </div>
        )}
      </div>

      {/* FAB */}
      {screen!=="add"&&screen!=="settings"&&(
        <button style={S.fab} onClick={()=>{setScreen("add");haptic();}}>
          <span style={{fontSize:28,color:"#fff",fontWeight:300,lineHeight:1}}>+</span>
        </button>
      )}
    </div>
  );
}

function makeStyles(dark) {
  const bg2 = dark ? "rgba(255,255,255,0.03)" : "rgba(0,0,0,0.03)";
  const bg3 = dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)";
  const sub = dark ? "#8a8a9a" : "#666";
  const border = dark ? "#222235" : "#ddd";
  return {
    app: { minHeight:"100vh",paddingBottom:100,position:"relative" },
    header: { display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px 8px",position:"sticky",top:0,zIndex:10,backdropFilter:"blur(20px)",background:dark?"rgba(19,19,32,0.85)":"rgba(255,255,255,0.85)" },
    hLeft: { display:"flex",alignItems:"center",gap:10 },
    hTitle: { fontSize:18,fontWeight:700,letterSpacing:"-0.02em" },
    setBtn: { background:"none",border:"none",fontSize:20,cursor:"pointer",padding:8 },
    dateNav: { display:"flex",justifyContent:"center",alignItems:"center",gap:12,padding:"6px 20px 12px" },
    dBtn: { background:bg3,border:"none",color:sub,fontSize:20,width:36,height:36,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center" },
    dCur: { background:"rgba(119,201,212,0.12)",border:"1px solid rgba(119,201,212,0.2)",color:"#77C9D4",fontSize:14,fontWeight:600,padding:"6px 18px",borderRadius:10,cursor:"pointer" },
    tabs: { display:"flex",gap:4,padding:"0 16px 12px",borderBottom:`1px solid ${border}` },
    tab: { flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 4px",background:"none",border:"none",borderRadius:10,cursor:"pointer",color:"#5a5a6a",transition:"all 0.2s" },
    tabA: { background:"rgba(119,201,212,0.1)",color:"#77C9D4" },
    content: { padding:"12px 16px" },
    empty: { display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 20px",gap:12 },
    secTitle: { fontSize:16,fontWeight:600,margin:"0 0 16px" },
    prompt: { fontSize:14,color:sub,marginBottom:12,marginTop:16 },
    emoGrid: { display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 },
    emoChip: { display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"12px 6px",borderRadius:14,cursor:"pointer",transition:"all 0.2s ease" },
    ta: { width:"100%",background:bg2,border:`1px solid ${border}`,borderRadius:12,color:"inherit",padding:"12px 14px",fontSize:14,lineHeight:1.5,resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box" },
    primBtn: { width:"100%",padding:"14px",borderRadius:14,border:"none",background:"#77C9D4",color:"#111",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:20,letterSpacing:"-0.01em" },
    backBtn: { background:"none",border:"none",color:"#77C9D4",fontSize:14,cursor:"pointer",fontWeight:500,padding:0 },
    perTabs: { display:"flex",gap:6,marginBottom:16 },
    perTab: { flex:1,padding:"8px",borderRadius:10,border:"none",background:bg3,color:"#6a6a7a",fontSize:13,fontWeight:500,cursor:"pointer",transition:"all 0.2s" },
    perTabA: { background:"rgba(119,201,212,0.15)",color:"#77C9D4" },
    chartBox: { background:bg2,borderRadius:16,padding:"16px 10px",marginBottom:16 },
    chTitle: { fontSize:14,fontWeight:600,color:"#a0a0b0",marginBottom:12,paddingLeft:6 },
    statCard: { flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:bg2,borderRadius:14,padding:"14px 8px" },
    statVal: { fontSize:22,fontWeight:700 },
    statLbl: { fontSize:11,color:"#6a6a7a" },
    sRow: { display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${border}` },
    sLabel: { fontSize:14,color:sub },
    toggle: { width:48,height:28,borderRadius:14,background:"#2a2a3a",border:"none",cursor:"pointer",padding:3,display:"flex",alignItems:"center",transition:"background 0.2s",position:"relative" },
    toggleOn: { background:"#77C9D4" },
    tKnob: { width:22,height:22,borderRadius:11,background:"#fff",transition:"transform 0.2s",transform:"translateX(0)" },
    tKnobOn: { transform:"translateX(20px)" },
    sel: { background:dark?"#1e1e2e":"#f0f0f0",border:`1px solid ${border}`,borderRadius:8,color:"inherit",padding:"6px 10px",fontSize:14,outline:"none" },
    hint: { fontSize:12,color:"#555",marginTop:12,lineHeight:1.5 },
    fab: { position:"fixed",bottom:24,right:20,width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#77C9D4 0%,#5BA8B5 100%)",border:"none",boxShadow:"0 8px 32px rgba(119,201,212,0.35)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 },
    toast: { position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"rgba(119,201,212,0.9)",color:"#111",padding:"10px 24px",borderRadius:12,fontSize:14,fontWeight:600,zIndex:1000,backdropFilter:"blur(10px)",boxShadow:"0 8px 32px rgba(0,0,0,0.3)" },
  };
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
